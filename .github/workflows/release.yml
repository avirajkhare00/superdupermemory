name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 — runs natively on M-series GitHub runners
          - name: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            asset_name: superdupermemory-macos-arm64

          # Linux ARM64 — cross-compiled on ubuntu-24.04-arm runner
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: superdupermemory-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      # Linux ARM64: native runner already has the right toolchain,
      # but we need a few system libs for the bundled SQLite build.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev

      - name: Build release binary
        run: |
          cargo build --release --package superdupermemory --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/superdupermemory
          ARCHIVE=${{ matrix.asset_name }}.tar.gz
          cp "$BIN" superdupermemory
          tar -czf "$ARCHIVE" superdupermemory
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Collect all tarballs and checksums
          ASSETS=()
          while IFS= read -r -d '' f; do
            ASSETS+=("$f")
          done < <(find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -print0)

          gh release create "$TAG" \
            --title "superdupermemory $TAG" \
            --notes "$(cat <<EOF
          ## superdupermemory $TAG

          ### Install

          **macOS ARM64**
          \`\`\`sh
          curl -L https://github.com/${{ github.repository }}/releases/download/$TAG/superdupermemory-macos-arm64.tar.gz | tar xz
          chmod +x superdupermemory
          sudo mv superdupermemory /usr/local/bin/
          \`\`\`

          **Linux ARM64**
          \`\`\`sh
          curl -L https://github.com/${{ github.repository }}/releases/download/$TAG/superdupermemory-linux-arm64.tar.gz | tar xz
          chmod +x superdupermemory
          sudo mv superdupermemory /usr/local/bin/
          \`\`\`

          ### Verify checksum
          \`\`\`sh
          sha256sum -c superdupermemory-<platform>-arm64.tar.gz.sha256
          \`\`\`

          ### First run
          \`\`\`sh
          superdupermemory install   # writes MCP config for Claude Code + Cursor
          superdupermemory serve     # start the MCP server
          \`\`\`
          EOF
          )" \
            "${ASSETS[@]}"
