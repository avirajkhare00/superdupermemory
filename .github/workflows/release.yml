name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: superdupermemory-linux-x86_64

          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: superdupermemory-linux-arm64

          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            asset: superdupermemory-macos-x86_64

          - name: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            asset: superdupermemory-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Build webapp
        run: npm ci --prefix webapp && npm run build --prefix webapp

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev

      - name: Build
        run: cargo build --release --bin superdupermemory --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin=target/${{ matrix.target }}/release/superdupermemory
          archive=${{ matrix.asset }}.tar.gz
          cp "$bin" superdupermemory
          tar czf "$archive" superdupermemory
          sha256sum "$archive" > "$archive.sha256"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.tar.gz.sha256
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release create "$TAG" \
            --title "superdupermemory $TAG" \
            --generate-notes \
            artifacts/*.tar.gz \
            artifacts/*.sha256
